<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Lost Llama</title>
  <link rel="icon" type="image/png" href="/assets/img/llama-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #af101a;
      --secondary: #885200;
      --secondary-container: #ffddb5;
      --surface: #f9f9f6;
      --surface-container-low: #f4f3ef;
      --surface-container: #eeede9;
      --on-surface: #1a1c1b;
      --outline: #74777f;
      --serif: 'Noto Serif', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--surface-container-low);
      color: var(--on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .gif-container {
      width: 280px;
      height: 280px;
      border-radius: 20px;
      overflow: hidden;
      background: var(--surface-container);
      margin-bottom: 36px;
      position: relative;
      box-shadow: 0 8px 40px rgba(26, 28, 27, 0.06);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s both;
    }
    .gif-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .gif-container img.active {
      display: block;
    }
    .error-code {
      font-family: var(--serif);
      font-size: 7rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--primary);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s both;
    }
    .error-code span {
      color: var(--secondary);
    }
    .error-line {
      width: 56px;
      height: 4px;
      background: var(--secondary);
      border-radius: 2px;
      margin: 24px auto;
      animation: lineExpand 0.6s ease 0.8s both;
    }
    .error-title {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 600;
      font-style: italic;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.8s ease 1s both;
    }
    .error-message {
      font-size: 0.95rem;
      color: var(--outline);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.2s both;
    }
    .error-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--on-surface);
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 0.75rem;
      background: var(--secondary-container);
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.4s both;
    }
    .error-home:hover {
      background: #f5c97a;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(136, 82, 0, 0.15);
    }
    .error-home svg {
      width: 18px;
      height: 18px;
    }
    .dots {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.6s both;
    }
    .dots button {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: none;
      background: var(--surface-container);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      padding: 0;
    }
    .dots button.active {
      background: var(--secondary);
      transform: scale(1.2);
    }
    .dots button:hover {
      background: var(--secondary);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineExpand {
      from { width: 0; opacity: 0; }
      to { width: 56px; opacity: 1; }
    }
    @media (max-width: 640px) {
      .gif-container { width: 220px; height: 220px; }
      .error-code { font-size: 5rem; }
      .error-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="gif-container" id="gifContainer">
    <img src="https://media1.tenor.com/m/Qr0iBlPVDgUAAAAd/emperors-new-groove-kuzco.gif" alt="Sad llama in the rain" class="active">
    <img src="https://media1.tenor.com/m/4H3sSEendXsAAAAd/yes-llama.gif" alt="Whining llama">
    <img src="https://media1.tenor.com/m/_mYFry21FRYAAAAd/angry.gif" alt="Angry llama">
    <img src="https://media1.tenor.com/m/9j6fuQEjwZcAAAAC/thaonema-llama.gif" alt="Crying llama">
  </div>

  <div class="dots" id="dots">
    <button class="active" data-index="0" aria-label="GIF 1"></button>
    <button data-index="1" aria-label="GIF 2"></button>
    <button data-index="2" aria-label="GIF 3"></button>
    <button data-index="3" aria-label="GIF 4"></button>
  </div>

  <h1 class="error-code">4<span>0</span>4</h1>
  <div class="error-line"></div>
  <p class="error-title">This llama has lost its way</p>
  <p class="error-message">Looks like you wandered off the trail. Even the best llamas take a wrong turn sometimes. Let's get you back to familiar pastures.</p>

  <a href="/" class="error-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Take Me Home
  </a>

  <script>
    (function() {
      const gifs = document.querySelectorAll('#gifContainer img');
      const dots = document.querySelectorAll('#dots button');
      let current = 0;
      let interval;

      function show(index) {
        gifs.forEach(g => g.classList.remove('active'));
        dots.forEach(d => d.classList.remove('active'));
        gifs[index].classList.add('active');
        dots[index].classList.add('active');
        current = index;
      }

      function next() {
        show((current + 1) % gifs.length);
      }

      function startRotation() {
        interval = setInterval(next, 4000);
      }

      dots.forEach(dot => {
        dot.addEventListener('click', () => {
          clearInterval(interval);
          show(parseInt(dot.dataset.index));
          startRotation();
        });
      });

      startRotation();
    })();
  </script>
</body>
</html>
